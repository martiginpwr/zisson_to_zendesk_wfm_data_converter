name: Backfill Queue CSVs

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "UTC inclusive start (e.g. 2024-03-01T00:00:00Z)"
        required: true
        type: string
      end_date:
        description: "UTC exclusive end (e.g. 2026-03-01T00:00:00Z)"
        required: true
        type: string
      queue_selection:
        description: "Comma-separated queue names or IDs. Empty = all queues"
        required: false
        default: ""
        type: string
      chunk_days:
        description: "API chunk size in days"
        required: false
        default: "7"
        type: string
      source_timezone:
        description: "Timezone used by interval strings from API (usually UTC)"
        required: false
        default: "UTC"
        type: string

permissions:
  contents: write

concurrency:
  group: zisson-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill
        env:
          ZISSON_API_TOKEN: ${{ secrets.ZISSON_API_TOKEN }}
          ZISSON_AUTH_HEADER: ${{ secrets.ZISSON_AUTH_HEADER }}
          ZISSON_AUTH_PREFIX: ${{ secrets.ZISSON_AUTH_PREFIX }}
        run: |
          python scripts/zisson_sync.py \
            --mode backfill \
            --start-date "${{ inputs.start_date }}" \
            --end-date "${{ inputs.end_date }}" \
            --queues "${{ inputs.queue_selection }}" \
            --chunk-days "${{ inputs.chunk_days }}" \
            --source-timezone "${{ inputs.source_timezone }}"

      - name: Commit changed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed state/sync_state.json
          if git diff --cached --quiet; then
            echo "No file changes to commit"
            exit 0
          fi
          git commit -m "chore(data): backfill queue csv snapshots"
          git push
